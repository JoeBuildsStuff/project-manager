name: Tag & Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version and push tag
        id: bump
        run: |
          LATEST=$(git tag --sort=-v:refname | head -1)
          LATEST=${LATEST:-v0.0.0}
          VERSION=${LATEST#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "Latest: $LATEST → New: $NEW_TAG"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "version=${NEW_TAG#v}" >> "$GITHUB_OUTPUT"

  build:
    needs: tag
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Sync version from git tag
        run: |
          VERSION="${{ needs.tag.outputs.version }}"
          echo "Setting version to $VERSION"
          sed -i '' "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
          sed -i '' "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" package.json
          cat src-tauri/tauri.conf.json | head -5

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build

      - name: Create release and upload artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.tag.outputs.new_tag }}"
          VERSION="${{ needs.tag.outputs.version }}"
          BUNDLE_DIR="src-tauri/target/release/bundle"

          echo "=== Bundle contents ==="
          find "$BUNDLE_DIR" -type f | head -30

          # Locate artifacts
          DMG=$(find "$BUNDLE_DIR/dmg" -name "*.dmg" | head -1)
          TAR=$(find "$BUNDLE_DIR/macos" -name "*.tar.gz" | head -1)
          SIG=$(find "$BUNDLE_DIR/macos" -name "*.tar.gz.sig" | head -1)

          echo "DMG: $DMG"
          echo "TAR: $TAR"
          echo "SIG: $SIG"

          if [ -z "$SIG" ]; then
            echo "ERROR: No .sig file found!"
            exit 1
          fi

          SIGNATURE=$(cat "$SIG")
          echo "Signature: $SIGNATURE"

          # Create the GitHub release
          gh release create "$TAG" \
            --title "Project Manager $TAG" \
            --notes "See the commits for changes in this release."

          # Upload DMG and tar.gz
          gh release upload "$TAG" "$DMG"
          gh release upload "$TAG" "$TAR"

          # Get the tar.gz download URL
          TAR_URL=$(gh release view "$TAG" --json assets \
            --jq '.assets[] | select(.name | endswith(".tar.gz")) | .url')
          echo "Tar URL: $TAR_URL"

          # Create latest.json for the Tauri updater
          jq -n \
            --arg version "$VERSION" \
            --arg notes "See the commits for changes in this release." \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg signature "$SIGNATURE" \
            --arg url "$TAR_URL" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": {
                  signature: $signature,
                  url: $url
                }
              }
            }' > latest.json

          echo "=== latest.json ==="
          cat latest.json

          # Upload latest.json
          gh release upload "$TAG" latest.json
