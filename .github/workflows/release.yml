name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Sync version from git tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting version to $VERSION"
          sed -i '' "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
          sed -i '' "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" package.json
          cat src-tauri/tauri.conf.json | head -5

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build

      - name: Create release and upload artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUNDLE_DIR="src-tauri/target/release/bundle"

          echo "=== Bundle contents ==="
          find "$BUNDLE_DIR" -type f | head -30

          # Locate artifacts
          DMG=$(find "$BUNDLE_DIR/dmg" -name "*.dmg" | head -1)
          TAR=$(find "$BUNDLE_DIR/macos" -name "*.tar.gz" | head -1)
          SIG=$(find "$BUNDLE_DIR/macos" -name "*.tar.gz.sig" | head -1)

          echo "DMG: $DMG"
          echo "TAR: $TAR"
          echo "SIG: $SIG"

          if [ -z "$SIG" ]; then
            echo "ERROR: No .sig file found!"
            exit 1
          fi

          SIGNATURE=$(cat "$SIG")
          echo "Signature: $SIGNATURE"

          # Create the GitHub release
          gh release create "$GITHUB_REF_NAME" \
            --title "Project Manager $GITHUB_REF_NAME" \
            --notes "See the commits for changes in this release."

          # Upload DMG and tar.gz
          gh release upload "$GITHUB_REF_NAME" "$DMG"
          gh release upload "$GITHUB_REF_NAME" "$TAR"

          # Get the tar.gz download URL (GitHub replaces spaces with dots in asset names)
          TAR_URL=$(gh release view "$GITHUB_REF_NAME" --json assets \
            --jq '.assets[] | select(.name | endswith(".tar.gz")) | .browserDownloadUrl')
          echo "Tar URL: $TAR_URL"

          # Create latest.json for the Tauri updater
          jq -n \
            --arg version "$VERSION" \
            --arg notes "See the commits for changes in this release." \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg signature "$SIGNATURE" \
            --arg url "$TAR_URL" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": {
                  signature: $signature,
                  url: $url
                }
              }
            }' > latest.json

          echo "=== latest.json ==="
          cat latest.json

          # Upload latest.json
          gh release upload "$GITHUB_REF_NAME" latest.json
