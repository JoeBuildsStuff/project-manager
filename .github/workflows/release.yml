name: Release

on:
  push:
    tags:
      - "v*"

# tauri-action creates the GitHub Release and uploads artifacts; the default
# GITHUB_TOKEN is often read-only unless contents write is granted.
permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Sync version from git tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting version to $VERSION"
          # Update tauri.conf.json
          sed -i '' "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          # Update Cargo.toml
          sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
          # Update package.json
          sed -i '' "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" package.json
          cat src-tauri/tauri.conf.json | head -5

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Project Manager ${{ github.ref_name }}"
          releaseBody: "See the commits for changes in this release."
          releaseDraft: false
          prerelease: false

      - name: Upload updater JSON
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUNDLE_DIR="src-tauri/target/release/bundle"

          # Find the .sig file
          SIG_FILE=$(find "$BUNDLE_DIR" -name "*.tar.gz.sig" | head -1)
          echo "Found sig file: $SIG_FILE"
          if [ -z "$SIG_FILE" ]; then
            echo "ERROR: No .sig file found!"
            exit 1
          fi
          SIGNATURE=$(cat "$SIG_FILE")

          # Get the tar.gz browser download URL from the release
          TAR_URL=$(gh release view "$GITHUB_REF_NAME" --json assets \
            --jq '.assets[] | select(.name | endswith(".tar.gz")) | .browserDownloadUrl')
          echo "Tar URL: $TAR_URL"

          # Create latest.json for the Tauri updater
          jq -n \
            --arg version "$VERSION" \
            --arg notes "See the commits for changes in this release." \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg signature "$SIGNATURE" \
            --arg url "$TAR_URL" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": {
                  signature: $signature,
                  url: $url
                }
              }
            }' > latest.json

          echo "Generated latest.json:"
          cat latest.json

          # Upload to the release
          gh release upload "$GITHUB_REF_NAME" latest.json --clobber
